{% block content %}
<h1>Login</h1>

<form>
    <label for="username">Nome</label><br>
    <input id="username" type="text" name="username" placeholder="Digite seu nome" required><br><br>

    <label for="password">Senha</label><br>
    <input id="password" type="password" name="password" placeholder="Digite sua senha" required><br><br>

    <button type="submit">Entrar</button>
</form>
{% endblock %}
