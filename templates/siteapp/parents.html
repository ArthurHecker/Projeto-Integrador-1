{% block content %}
<h1>Cadastro de Pais</h1>

<form>
    <label for="parent_name">Nome do Pai</label><br>
    <input id="parent_name" type="text" name="parent_name" placeholder="Nome do pai" required><br><br>

    <label for="child_name">Nome do Filho</label><br>
    <input id="child_name" type="text" name="child_name" placeholder="Nome do filho" required><br><br>

    <button type="submit">Cadastrar</button>
</form>
{% endblock %}
