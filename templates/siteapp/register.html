
{% block content %}
<h1>Registro</h1>

<form>
    <label for="username">Nome</label><br>
    <input id="username" type="text" name="username" placeholder="Digite seu nome" required><br><br>

    <label for="password1">Senha</label><br>
    <input id="password1" type="password" name="password1" placeholder="Digite sua senha" required><br><br>

    <label for="password2">Confirmar senha</label><br>
    <input id="password2" type="password" name="password2" placeholder="Digite novamente" required><br><br>

    <button type="submit">Registrar</button>
</form>
{% endblock %}
